codecov:
  require_ci_to_pass: yes

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: 60%
        threshold: 2%
        base: auto
    patch:
      default:
        target: 70%
        threshold: 5%
      non_code:
        informational: true
        paths:
          - "assets/**"
          - "docs/**"
          - ".github/**"
          - "scripts/**"
          - "AGENTS.md"
          - "CLAUDE.md"
          - "README.md"
          - "install.sh"
          - "lefthook.yml"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true

ignore:
  - "**/*_test.go"

flags:
  unittests:
    paths:
      - cmd/
      - internal/
    carryforward: true

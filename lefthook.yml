# lefthook.yml — gh-hound git hooks
# Install with: make hooks

pre-commit:
  parallel: true
  commands:
    gofix-check:
      glob: "*.go"
      run: make gofix-check
    fmt-check:
      glob: "*.go"
      run: make fmt-check
    lint:
      glob: "*.go"
      run: make lint
    test-short:
      glob: "*.go"
      run: go test -short -count=1 ./...

pre-push:
  commands:
    ci:
      run: make ci
      fail_text: "CI failed. Fix local gates before pushing."

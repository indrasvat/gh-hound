<!doctype html>
<!-- Source for og-card.png. Render at exactly 1200x630:
     chrome headless screenshot, then commit the PNG next to this file.
     Not linked from the site; kept for future regeneration. -->
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=IBM+Plex+Mono:wght@500;600&display=swap">
<style>

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1200px; height: 630px; overflow: hidden; }
  body {
    background: #0E0F0C;
    color: #EAE8D9;
    font-family: "Bricolage Grotesque", "Avenir Next", sans-serif;
    position: relative;
  }
  .glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(700px 360px at 14% -6%, rgba(79,211,122,0.10), transparent 65%),
      radial-gradient(600px 400px at 100% 20%, rgba(110,156,181,0.06), transparent 60%);
  }
  .card {
    position: relative;
    padding: 64px 72px 0;
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .head { display: flex; align-items: center; gap: 18px; }
  .head img { width: 64px; height: 64px; border-radius: 50%; }
  .head .name {
    font-family: "IBM Plex Mono", "SF Mono", monospace;
    font-size: 30px; font-weight: 600;
  }
  h1 {
    margin-top: 42px;
    font-size: 64px;
    font-weight: 650;
    letter-spacing: -0.025em;
    line-height: 1.06;
    max-width: 18ch;
  }
  h1 .accent { color: #4FD37A; }
  .sub {
    margin-top: 22px;
    font-size: 25px;
    color: #AEB39B;
    max-width: 44ch;
  }
  .chip {
    position: absolute;
    left: 72px; bottom: 64px;
    font-family: "IBM Plex Mono", monospace;
    font-size: 21px;
    color: #CFCDBB;
    background: #1B1D17;
    border: 1px solid #3D4233;
    border-radius: 10px;
    padding: 14px 22px;
  }
  .chip .ps1 { color: #4FD37A; }
  .strip {
    position: absolute;
    right: -210px; bottom: -56px;
    width: 680px;
    transform: rotate(-4deg);
    border: 1px solid #3D4233;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
  }
  .strip img { width: 100%; display: block; }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="head">
      <img src="assets/logo.png" alt="">
      <span class="name">gh-hound</span>
    </div>
    <h1>GitHub Actions, without the <span class="accent">browser side quest</span>.</h1>
    <p class="sub">A fast terminal cockpit for CI triage. TUI for humans, JSON for agents.</p>
    <span class="chip"><span class="ps1">$</span> gh extension install indrasvat/gh-hound</span>
    <div class="strip"><img src="assets/shots/failure.png" alt=""></div>
  </div>
</body>
</html>
